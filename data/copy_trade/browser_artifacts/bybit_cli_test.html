 smarter with Bybit on TradingView. Execute trades directly from advanced charts, leverage comprehensive analysis tools, and enjoy top-notch liquidity for a seamless trading experience. ","bannerDescS2":"Auction Phase 2 ends in","preMarketA1":"Pre-Market Perpetuals Trading is an over-the-counter (OTC) trading service that allows you to trade Perpetual Contracts on new tokens before official listing. This offers the chance to engage in early price discovery and speculate on the future value of the upcoming tokens. \n\nWith Pre-Market Perpetuals, you can:\n\nGain Early Access to Promising New Contracts\nPre-Market Perpetuals enable you to place orders before the contract is officially listed, helping you avoid potential entry cost increases due to price volatility at launch. Upon a successful opening, your order will be executed at the opening price if it matches your specified price.\n\nHedge Spot Positions to Secure Profits\nIf you have adopted a short-selling strategy or engaged in Pre-Market Spot Trading, you can hedge with Pre-Market Perpetuals to minimize risks.","preMarketA2":"Bybit's Call Auction takes place in three (3) phases to minimize post-opening price volatility and reduce liquidation risks.\n\nAuction Phase 1: To discover the fair price. You are free to place or cancel orders at your desired price, which helps establish the market consensus price. The Est. Opening Price is calculated every minute for the first 10 minutes, and every five (5) seconds for the next 10 minutes. No fees are charged during this session. \nAuction Phase 2: To stabilize prices and prevent manipulation. Orders can be placed, but not canceled. The Est. Opening Price is calculated every five (5) seconds throughout this five-minute phase. \n\nPrice Matching: To determine the opening price and execute orders. Upon a successful opening, all matchable buy and sell orders will be fulfilled, and positions will be opened at the opening price. Any unfulfilled orders will remain in the ord  much of the contract you're trading. For example, the contract size for gold is typically 100 ounces, so choosing 1 lot means you're trading 100 ounces of gold. Please note that contract size may vary by market.","tradeFi":"TradeFi","tradeTradfi":"Trade - TradFi","riskAgreement":"Risk Disclosure Agreement","riskAgreement1":"This agreement outlines the risks of trading complex financial instruments, including but not limited to leverage, market volatility and liquidity. By signing, you acknowledge and accept that:","riskAgreement2":"You’re trading a CFD (Contract for Difference) product, not owning the underlying asset. You’re trading on price movements with the flexibility to go long or short and up to 5× leverage, but without actual asset delivery.","keyFeatures":"Key features:","cfdsFlexibility":"CFDs offer added flexibility, including leveraged trading up to 5×.","tradesSettledUsdt":"All trades are settled in USDT. No currency conversions or traditional brokerage accounts required.","costStructureBybitCfds":"To better understand the cost structure of CFD trading on Bybit, please refer to the following:","spreadCost":"Spread cost","bidAskSpread":"This spread refers to the bid-ask price gap. It’s an implicit cost reflected in the quoted price and may vary depending on market volatility or instrument type.","tradingFees":"Trading fees","instrumentsFees":"Some instruments (e.g. stock CFDs) incur per-share or per-order fees. Refer to the product details page for exact rates.","overnightInterestFees":"Overnight interest (swap fees)","overnightInterestCharges":"Holding positions overnight incurs interest charges based on trading direction and prevailing market interest rates.\n\nYou’re responsible for your risk assessment and should seek independent professional advice before trading.","exploreFeatures":"Vast possibilities, unlocked","mt5PageTitle":"Bybit TradFi Trading","experience":"Stay ahead of your peers","mt5Forex":"Forex","mt5CfdDetails":"CFD (metal, oil, indices and stocks)","mt5Advantages":"Why use Bybit TradFi","mt5AdvantagesDesc":"Take control with Bybit’s all-in-one trading platform. With Bybit TradFi, you get fast orders, smart tools, and clear analysis. Access multi-asset markets, advanced charting and real-time data — now that's trading with confidence.","mt5SignUpDesc":"Sign up and activate a free TradeFi account.","transferFundsToMt5":"Fund your account – no minimum deposit required.","mt5Trade":"Forex and CFD (metal, oil, indices and stocks) trades at your fingertips","mt5Q1":"Q1: What's Bybits TradFi's server name?","mt5A1":"A1: The server name is Bybit-Live-2. You’ll see Infra Capital Limited listed as the legal entity when searching for the Bybit server.","mt5Q2":"Q2: Is there a minimum deposit required for trading on Bybit TradFi?","mt5A2":"A2: No, there isn't a required minimum deposit.","mt5Q3":"Q3: How do I deposit into my Bybit TradFi account?","mt5A3":"A3: Deposits go to your Funding Account by default. Once received, you can manually transfer funds from the Funding Account to your TradeFi Account.","mt5Q4":"Q4: Which currencies are supported for deposits in Bybit TradFi?","mt5Q5":"Q5: What's Bybit TradFi's fee structure like?","mt5A5":"A5: Our fee structure is as follows: Forex, commodities, indices: $0.1 – $6 per lot; Stock CFDs: $0.04 per share, minimum $5 commission per order.\nNote: Fees vary by contract type.","mt5Q6":"Q6: What's the Stop-Out level on Bybit TradFi?","mt5A6":"A6: The Stop-Out level is 50%. If your TradeFi Account's margin level (equity / margin) drops to 50% or less, positions may be automatically closed.","mt5Q7":"Q7: Which trading pairs are available on Bybit TradFi?","mt5A7":"A7: Bybit TradFi offers trading in forex and CFDs — including metals, oil, indices and stocks. Each offers various types of trading contracts.","mt5Q8":"Q8: How is the Swap Fee calculated on Bybit TradFi?","mt5BalanceUpdatePending":"Your TradFi account balance is pending an update due to an ongoing transaction.","accountArchivedTip":"Your account has been archived. Go to your TradFi Dashboard to reactivate it.","mt5MetaTitle":"Bybit TradFi Trading | Powerd by MetaTrader 5","mt5A8":"A8: Swap Fees are charged daily at 11:59 PM UTC+3. The formula is: Swap fee = Lot size * Market price × (Swap rate % / 365). This applies to all open positions at the end of each swap interval.","tradeGoldFx":"Unlock the Power of Bybit TradFi","goldFxCopyTrading":"TradFi Copy Trading","goldFX":"TradFi","goldFxTrading":"TradFi trading","tradeGoldFxD2":"Transfer USDT from your Funding Account or UTA to your TradFi Account.","connectToMT5":"Connect to MT5","mt5A4":"A4: All CFD products are settled in USD, with deposits made in USDT. The exchange between USDT and USD happens automatically during CFD trading.","accountRestrictedError":"You can't open a new account as your account is currently restricted. For any questions, contact our Customer Support.","submit":"Submit","mt5UsdxA4":"A4: All CFD products are settled in USD, with deposits made in USDx. The exchange between USDx and USD happens automatically during CFD trading.","mt5Agreement":"Bybit MT5 User Agreement v06 (Aug 1, 2025)\nUSER AGREEMENT – BYBIT METATRADER 5 (MT5)\n\n1. Introduction\n1.1. The service of trading on the MT5 platform on the Site (as defined below) and the associated application program or mobile applications (together referred to as the \"MT5 Platform\") and related services (together, the \"MT5 Services\") are provided by Infra Capital Limited, a company incorporated in Mauritius with its registered address at Suite 201, 2nd Floor, The Catalyst, 40 Silicon Avenue, Ebene Cybercity, Mauritius, and bearing registration number 200907 (hereinafter, the \"Company\", \"we\", \"us\" or \"our\").\n\n1.2. Certain parts of the MT5 Services that involve trading or dealing with Digital Assets are provided by Bybit Technology Limited.\n\n1.3. For the avoidance of doubt, the Parties acknowledge and agree that:\nInfra shall be the contracting party and regulated entity with respect to the CFD (as defined below) services offered via the TradFi platform.Bybit Technology Limited (\"Bybit\") acts solely as an infrastructure service provider to Infra for the purposes of onboarding facilitation, user interface execution, ledger support, sub-custody of client funds and fiat conversion services under this Agreement. Any separate relationship between a client and Bybit, including but not limited to the provision of custodial, wallet or trading services by Bybit under separate terms and conditions, shall be deemed independent of, and unrelated to, the services provided under this Agreement.Infra and Bybit operate as independent service providers. Nothing in this Agreement shall be construed to create a joint service offering, partnership, agency or shared client relationship. Infra remains solely responsible for its clients, including onboarding, AML/CFT compliance and custody of assets. Bybit does not hold or control client funds or virtual assets on behalf of Infra or its clients, nor does it perform any regulated activities unless expressly agreed to in writing, in compliance with applicable law. Any overlap of users shall not constitute or imply a joint client relationship.\n1.4. All access to and use of the MT5 Services are subject to the terms and conditions set forth below (the \"Terms\" or \"Agreement\"). This Agreement is entered into between you and the Company. If you (the \"User\", \"you\" or \"your\") do not agree to any terms or conditions of this Agreement, you must immediately cease using the MT5 Services.\n\n1.5. Your access to and use of the MT5 Services constitute your acceptance of, and agreement to be bound by, the terms and conditions of this Agreement, as well as the Terms of Service and Privacy Policy, which may be amended from time to time by us (in relation to this Agreement) or by Bybit Technology Limited (in relation to the Terms of Service and Privacy Policy), as the case may be.\n\n1.6. Unless otherwise defined or the context requires otherwise, all capitalized terms shall have the meaning given to them in this Agreement:\n\"Bybit Account\" has the meaning assigned to it in Clause 2.3.\"CFD\" means a Contract for Difference (which may be leveraged) between a buyer and a seller, under which the buyer agrees to pay the seller the difference between the opening and closing trade prices of a Referenced Asset, without buying or owning the Referenced Asset.\"Referenced Asset\" means the asset(s) referred to, including Digital Assets, foreign currencies and commodities.\"Settlements\" means the consideration paid by either party to the other at the conclusion of a CFD. All CFD products are settled exclusively in USD, regardless of the deposit or withdrawal currency. \"Digital Assets\" means Bitcoin, Ether, USDT, or other crypto, digital assets or currencies.\"Governmental Authority\" means any nation, government, province, state or any other political subdivision thereof, or any entity, authority or body exercising executive, legislative, judicial, regulatory or administrative functions of or pertaining to government. This includes any agency, department, board, commission, instrumentality or any political subdivision thereof; any court, tribunal or arbitrator; or any self-regulatory organization.\"Infra\" refers to Infra Capital Limited and Infra Capital Limited LLC.\"Personal Information\" means information provided by a User from which the User's identity may be directly or indirectly ascertained.\"Platform\" means the Site, including any associated application program or mobile applications.\"Service Notifications\" means one-way notifications from the Company (which may include security-related alerts) delivered via SMS, email or, where applicable, push notifications through the Site, concerning certain events or information related to the MT5 Services.\"Site\" means bybit.com, as operated by Bybit Technology Limited.\"Third-Party Account\" means a separate financial services account that a User establishes with a Third-Party Services Provider to conduct transactions.\"Third-Party Services Provider\" means any third party that offers a trading, fiat-to-crypto exchange or other financial services account that can be registered and accessed through the Platform.\"Third-Party Services Provider Terms\" means the terms, conditions and policies established by a Third-Party Services Provider for a Third-Party Account.\"USD\" or \"US$\" means United States Dollars, the legal currency of the United States of America.\n2. Account\n2.1. In order to use the services on the MT5 Platform, you must create a separate MT5 account (the \"MT5 Account\"). The MT5 Account will be used to record USDT transferred by you into your Bybit Account and to conduct transactions on the MT5 Platform. An MT5 Account may be registered by any individual who is at least eighteen (18) years old or by an institution through its duly authorized representatives, provided that such individual or institution has read and understood the Risk Disclosure Statements, which are incorporated by reference into, and form part of, this Agreement. Each User may register only one MT5 Account on the MT5 Platform. Registering multiple MT5 Accounts constitutes a violation of this Agreement and may result in the immediate termination of the MT5 Account(s) involved.\n\n2.2. The MT5 Account is not a bank account and does not hold any Digital Assets. Any balance displayed in the MT5 Account is solely a representation and record of the equivalent Digital Assets you have deposited into your Bybit Account and does not reflect any actual holding of those assets within the MT5 Account. For operational and financial reporting purposes, the Platform may reflect certain Digital Asset balances using internal, fiat-referenced units such as USDx. USDx is a non-transferable, non-tokenized unit of account used solely within the Platform to represent the USD-equivalent value of specific stablecoin holdings (e.g., USDT). Except as otherwise permitted by the Company, no interest will be paid on any funds reflected in your MT5 Account or Bybit Account. Any Digital Assets held directly by us for your benefit remain in your Bybit Account and are not insured by any Governmental Authority.\n\n2.3. Users acknowledge that:\nUSDx does not represent a separate asset or currency; it is an internal account metric.USDx always represents USDT at a 1:1 rate within the platform.USDx is not a token and cannot be transferred on-chain or withdrawn directly.USDx functions solely as an internal accounting reference to support platform usability, reconciliation and regulatory compliance.By using TradFi, you consent to the use of USDx in your account for display and accounting purposes.\n\n2.4. For the avoidance of doubt, the Parties acknowledge and agree that:\nInfra shall be the contracting party and regulated entity with respect to the CFD services offered via the Platform.Bybit acts solely as an infrastructure service provider to Infra for the purposes of onboarding facilitation, user interface execution, ledger support, sub-custody of client funds and fiat conversion services under this Agreement.Bybit does not provide investment advice, execution services or custody to clients in or from Mauritius, or on behalf of Infra.Bybit does not provide services in or from Mauritius; it is incorporated and operates in or from Seychelles.Any separate relationship between a client and Bybit, including but not limited to the provision of custodial, wallet or trading services by Bybit under separate terms and conditions, shall be deemed independent of, and unrelated to, the services provided under this Agreement.Infra and Bybit shall not be deemed to jointly offer services to any client, and no joint or shared client relationship shall arise from any overlap of users unless expressly and separately documented.\n2.5. You may fund the MT5 Account by transferring USDT to your account on the Platform opened with Bybit (\"Bybit Account\"). This transfer does not involve the actual custody of Digital Assets within the MT5 Account; it merely updates the representation of your available balance for trading purposes. The Platform does not charge any fees for funding the MT5 Account. In the event of the Company's insolvency, your Digital Assets (including StableX) may be subject to insolvency proceedings and are not protected by any external guarantees. \n\n\n3. Trading Using the MT5 Services\n3.1. The MT5 Platform is a marketplace that allows you to trade Contracts for Difference (\"CFDs\") with other Users. The MT5 Platform functions solely to match purchase and sale orders placed by Users and to assist in executing such orders in accordance with the Users' expressed intent. Except as expressly specified otherwise in this Agreement, neither the Company nor the Platform acts as a principal or counterparty to any such transactions. The Company and the Platform shall not be responsible for any disputes between or among Users in connection with any transaction.\n\n3.2. This also means that when you withdraw Digital Assets in the form of the Referenced Asset, you are instructing the Bybit Account to convert your Settlements into that Referenced Asset. For the avoidance of doubt, all CFD Settlements are calculated and executed in USD, regardless of the deposit or withdrawal currency. While deposits and withdrawals are made in USDT, the exchange between USDT and USD will occur automatically for the purpose of calculating and executing Settlements in fiat currency.\n\n3.2.1 You acknowledge and agree that all CFD Settlements are denominated and executed in USD. Although deposits and withdrawals may be made in USDT, the Platform will automatically perform all necessary currency conversions to facilitate settlement. You accept any exchange rate applied at the time of conversion and acknowledge and assume any associated exchange risk, including ing service that allows you to trade Perpetual Contracts on new tokens before official listing. This offers the chance to engage in early price discovery and speculate on the future value of the upcoming tokens. \n\nWith Pre-Market Perpetuals, you can:\n\nGain Early Access to Promising New Contracts\nPre-Market Perpetuals enable you to place orders before the contract is officially listed, helping you avoid potential entry cost increases due to price volatility at launch. Upon a successful opening, your order will be executed at the opening price if it matches your specified price.\n\nHedge Spot Positions to Secure Profits\nIf you have adopted a short-selling strategy or engaged in Pre-Market Spot Trading, you can hedge with Pre-Market Perpetuals to minimize risks.","participateProcess":"How to Trade Pre-Market Perpetuals","htParticipate":"How to Participate in Call Auction","preListingContractModalDesc3":"Bybit's Call Auction takes place in three (3) phases to minimize post-opening price volatility and reduce liquidation risks.\n\nAuction Phase 1: To discover the fair price. You are free to place or cancel orders at your desired price, which helps establish the market consensus price. The Est. Opening Price is calculated every minute for the first 10 minutes, and every five (5) seconds for the next 10 minutes. No fees are charged during this session. \nAuction Phase 2: To stabilize prices and prevent manipulation. Orders can be placed, but not canceled. The Est. Opening Price is calculated every five (5) seconds throughout this five-minute phase. \n\nPrice Matching: To determine the opening price and execute orders. Upon a successful opening, all matchable buy and sell orders will be fulfilled, and positions will be opened at the opening price. Any unfulfilled orders will remain in the order book and can be canceled during the Continuous Auction phase. You can check if your orders have been fulfilled once Price Matching is completed.","wiPreListingContract":"What a
